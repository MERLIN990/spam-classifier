services:
  spam-detector:
    build: .
    image: spam-detector:local
    container_name: spam-detector
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os,urllib.request; urllib.request.urlopen('http://localhost:' + os.environ.get('PORT','8000') + '/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
